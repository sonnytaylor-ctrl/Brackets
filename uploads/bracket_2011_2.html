<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Albums of 2011 — Bracket</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter+Tight:wght@300;400;600;700;900&display=swap');
  :root { --gold:#dca028; --gold-light:#f0c060; --muted:#777; --text:#e8e8e8; }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Inter Tight',sans-serif;min-height:100vh;overflow-x:auto;background:#000;}
  #vanta-bg{position:fixed;inset:0;z-index:0;}
  .noise{position:fixed;inset:0;z-index:1;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");opacity:0.04;pointer-events:none;}
  .page{position:relative;z-index:2;padding:32px 20px 80px;min-width:1100px;}
  header{text-align:center;margin-bottom:44px;}
  .logo-wrap{margin-bottom:16px;}
  .logo-wrap img{height:90px;filter:invert(1) drop-shadow(0 0 12px rgba(220,160,40,0.6));}
  .year-tag{font-family:'Bebas Neue',sans-serif;font-size:11px;letter-spacing:4px;color:var(--gold);margin-bottom:4px;opacity:0.8;}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(52px,8vw,88px);letter-spacing:4px;line-height:0.9;background:linear-gradient(135deg,#fff 0%,var(--gold-light) 50%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px;}
  .subtitle{font-size:12px;color:var(--muted);letter-spacing:3px;text-transform:uppercase;font-weight:300;}
  .instructions{margin-top:10px;font-size:11px;color:rgba(220,160,40,0.55);letter-spacing:1px;}
  .bracket-wrap{display:flex;align-items:center;justify-content:center;gap:0;padding:0 10px;}
  .round{display:flex;flex-direction:column;}
  .round-label{text-align:center;font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);padding-bottom:12px;font-weight:600;}
  .round-slots{display:flex;flex-direction:column;}
  .matchup{display:flex;flex-direction:column;gap:2px;}
  .conn{width:24px;flex-shrink:0;align-self:stretch;position:relative;}
  .team{display:flex;align-items:center;gap:9px;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:5px;cursor:pointer;transition:all 0.18s ease;width:210px;overflow:hidden;user-select:none;}
  .team:hover{background:rgba(255,255,255,0.10);border-color:rgba(220,160,40,0.35);transform:translateX(2px);}
  .team.winner{background:rgba(220,160,40,0.13);border-color:var(--gold);animation:pulse-gold 2.5s ease-in-out infinite;}
  .team.winner .team-name{color:var(--gold-light);font-weight:700;}
  .team.winner .seed{color:var(--gold);}
  .team.eliminated{opacity:0.3;}
  .team.eliminated .team-name{text-decoration:line-through;color:var(--muted);}
  .seed{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted);width:18px;text-align:center;flex-shrink:0;line-height:1;}
  .team-info{flex:1;min-width:0;}
  .team-name{font-size:11px;font-weight:600;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
  .team-artist{font-size:9.5px;color:var(--muted);font-weight:300;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
  .win-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:0;transition:opacity 0.3s;box-shadow:0 0 8px var(--gold);}
  .team.winner .win-dot{opacity:1;}
  .champ-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;gap:14px;min-width:180px;}
  .champ-label{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:4px;color:var(--gold);}
  .champ-card{background:rgba(220,160,40,0.07);border:1px solid rgba(220,160,40,0.25);border-radius:10px;padding:18px 14px;text-align:center;width:170px;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all 0.4s;}
  .champ-card.filled{border-color:var(--gold);background:rgba(220,160,40,0.14);animation:pulse-gold 2s ease-in-out infinite;}
  .champ-trophy{font-size:26px;line-height:1;}
  .champ-name{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gold-light);letter-spacing:1px;line-height:1.1;}
  .champ-artist{font-size:9px;color:var(--muted);font-weight:300;}
  .champ-tbd{font-size:11px;color:rgba(220,160,40,0.3);letter-spacing:2px;}
  .reset-btn{display:block;margin:36px auto 0;padding:9px 26px;background:transparent;border:1px solid rgba(255,255,255,0.12);border-radius:4px;color:var(--muted);font-family:'Inter Tight',sans-serif;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;}
  .reset-btn:hover{border-color:var(--gold);color:var(--gold);}
  @keyframes pulse-gold{0%,100%{box-shadow:0 0 16px rgba(220,160,40,0.35),0 0 50px rgba(220,160,40,0.12);}50%{box-shadow:0 0 28px rgba(220,160,40,0.55),0 0 80px rgba(220,160,40,0.2);}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>

  return t;
}

function setWinner(mid,sid){
  clearDownstream(mid);
  state[mid]=sid;
  localStorage.setItem('bracket2011v3',JSON.stringify(state));
  render();
}

function clearDownstream(mid){
  structure.rounds.forEach(r=>{
    r.matchups.forEach(m=>{
      if(m.feedFrom&&m.feedFrom.includes(mid)){
        delete state[m.id];
        clearDownstream(m.id);
      }
    });
  });
}

function resetBracket(){
  state={};
  localStorage.setItem('bracket2011v3','{}');
  render();
}

function roundGap(ri){return ri===0?8:ri===1?30:ri===2?78:0;}

function render(){
  const wrap=document.getElementById('bracketWrap');
  wrap.innerHTML='';
  structure.rounds.forEach((round,ri)=>{
    if(ri>0){const c=document.createElement('div');c.style.cssText='width:20px;flex-shrink:0;';wrap.appendChild(c);}
    const roundEl=document.createElement('div');
    roundEl.className='round';
    const label=document.createElement('div');
    label.className='round-label';
    label.textContent=round.label;
    roundEl.appendChild(label);
    const slots=document.createElement('div');
    slots.className='round-slots';
    slots.style.cssText=`display:flex;flex-direction:column;gap:${roundGap(ri)}px;`;
    round.matchups.forEach(m=>{
      const teams=getMatchupTeams(m);
      const winner=getWinner(m.id);
      const mEl=document.createElement('div');
      mEl.className='matchup';
      teams.forEach((tid,ti)=>{
        const tEl=makeTeamEl(tid,m.id,winner);
        tEl.style.animation=`fadeUp 0.35s ease ${ri*0.07+ti*0.03}s both`;
        mEl.appendChild(tEl);
        if(ti===0){const sp=document.createElement('div');sp.style.height='2px';mEl.appendChild(sp);}
      });
      slots.appendChild(mEl);
    });
    roundEl.appendChild(slots);
    wrap.appendChild(roundEl);
  });
  // spacer then champion
  const sp=document.createElement('div');sp.style.cssText='width:20px;flex-shrink:0;';wrap.appendChild(sp);
  const cw=document.createElement('div');
  cw.className='champ-wrap';
  const cl=document.createElement('div');cl.className='champ-label';cl.textContent='🏆 Champion';cw.appendChild(cl);
  const cc=document.createElement('div');
  const fw=getWinner('f1');
  cc.className='champ-card'+(fw?' filled':'');
  if(fw){const s=getSeed(fw);cc.innerHTML=`<div class="champ-trophy">🏆</div><div class="champ-name">${s?s.album:'?'}</div><div class="champ-artist">${s?s.artist:''}</div>`;}
  else cc.innerHTML='<div class="champ-tbd">TBD</div>';
  cw.appendChild(cc);
  wrap.appendChild(cw);
}

function makeTeamEl(tid,mid,winner){
  const el=document.createElement('div');
  el.className='team';
  if(!tid){
    el.style.opacity='0.2';el.style.cursor='default';
    el.innerHTML='<div class="seed">—</div><div class="team-info"><div class="team-name" style="color:var(--muted)">TBD</div></div><div class="win-dot"></div>';
    return el;
  }
  const s=getSeed(tid);
  if(winner===tid) el.classList.add('winner');
  else if(winner&&winner!==tid) el.classList.add('eliminated');
  el.innerHTML=`<div class="seed">${tid}</div><div class="team-info"><div class="team-name">${s?s.album:tid}</div><div class="team-artist">${s?s.artist:''}</div></div><div class="win-dot"></div>`;
  el.addEventListener('click',()=>{if(winner!==tid) setWinner(mid,tid);});
  return el;
}

render();
</script>
</body>
</html>
